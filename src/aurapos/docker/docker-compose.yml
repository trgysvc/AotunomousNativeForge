version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  electric:
    image: electricsql/electric:latest
    container_name: electric
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${SUPABASE_DB_URL}
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 3000 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  branch-server:
    build:
      context: ./apps/branch-server
      dockerfile: Dockerfile.branch-server
    container_name: branch-server
    ports:
      - "4000:4000"
    environment:
      - SUPABASE_DB_URL=${SUPABASE_DB_URL}
    depends_on:
      redis:
        condition: service_healthy
      electric:
        condition: service_healthy